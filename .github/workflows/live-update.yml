name: Live Update (CapGo OTA)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_GROQ_API_KEY: ${{ secrets.NEXT_PUBLIC_GROQ_API_KEY }}

      - name: Set Bundle Version
        run: |
          V=$(node -p "const v=require('./package.json').version.split('.'); \`\${v[0]}.\${v[1]}.${{ github.run_number }}\`")
          echo "CAPGO_BUNDLE=$V" >> $GITHUB_ENV

      - name: CapGo Deploy
        env:
          CAPGO_TOKEN: ${{ secrets.CAPGO_TOKEN }}
        run: |
          if [ -z "$CAPGO_TOKEN" ]; then
            echo "Error: CAPGO_TOKEN is not set!"
            exit 1
          fi
          npx @capgo/cli@latest bundle upload io.symbiosis.protocol \
            --apikey "$CAPGO_TOKEN" \
            --path out/ \
            --channel production \
            --bundle "$CAPGO_BUNDLE"
